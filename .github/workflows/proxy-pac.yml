name: Proxy Pool & PAC Generator

on:
  schedule:
    # 北京时间 07:00-19:00 每小时（UTC 23:00 - 11:00）
    - cron: '0 23 * * *'   # 07:00 CST
    - cron: '0 0 * * *'    # 08:00 CST
    - cron: '0 1 * * *'    # 09:00 CST
    - cron: '0 2 * * *'    # 10:00 CST
    - cron: '0 3 * * *'    # 11:00 CST
    - cron: '0 4 * * *'    # 12:00 CST
    - cron: '0 5 * * *'    # 13:00 CST
    - cron: '0 6 * * *'    # 14:00 CST
    - cron: '0 7 * * *'    # 15:00 CST
    - cron: '0 8 * * *'    # 16:00 CST
    - cron: '0 9 * * *'    # 17:00 CST
    - cron: '0 10 * * *'   # 18:00 CST
    - cron: '0 11 * * *'   # 19:00 CST
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests PySocks

      - name: Fetch & Validate Proxies
        run: python3 .github/scripts/validate_proxies.py

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./output

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
