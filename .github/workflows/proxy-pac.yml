name: Proxy Pool & PAC Generator (HTTP Only - Real Proxy Verify)

on:
  schedule:
    - cron: '0 23 * * *'
    - cron: '0 0 * * *'
    - cron: '0 1 * * *'
    - cron: '0 2 * * *'
    - cron: '0 3 * * *'
    - cron: '0 4 * * *'
    - cron: '0 5 * * *'
    - cron: '0 6 * * *'
    - cron: '0 7 * * *'
    - cron: '0 8 * * *'
    - cron: '0 9 * * *'
    - cron: '0 10 * * *'
    - cron: '0 11 * * *'
  workflow_dispatch:
    inputs:
      enable_geo_filter:
        description: 'Enable geo filter (default: JP/KR/SG/MY/HK + fallback)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch & Validate Proxies
        run: |
          mkdir -p output
          python3 << 'PYEOF'
          import requests, socket, time, re, json, os, sys
          from urllib.parse import urlparse
          from concurrent.futures import ThreadPoolExecutor, as_completed

          # ========== 配置 ==========
          TEST_URL = "http://httpbin.org/ip"
          TCP_TIMEOUT = 2
          HTTP_TIMEOUT = 8
          FETCH_TIMEOUT = 10
          MAX_LATENCY_MS = 5000
          MAX_WORKERS = 30
          TOP_N = 10
          GEO_MIN_COUNT = 3

          geo_input = os.environ.get("INPUT_ENABLE_GEO_FILTER", "true").lower().strip()
          ENABLE_GEO_FILTER = geo_input in ("true", "1", "yes", "on")

          TARGET_CODES = {"JP", "KR", "SG", "MY", "HK", "TW", "TH", "VN", "ID", "PH"}

          # ========== 仅 HTTP 代理源 ==========
          SOURCES = [
              ("https://raw.githubusercontent.com/saisuiu/Lionkings-Http-Proxys-Proxies/main/cnfree.txt", "http", False),
              ("https://raw.githubusercontent.com/proxygenerator1/ProxyGenerator/main/MostStable/http.txt", "http", False),
              ("https://raw.githubusercontent.com/proxygenerator1/ProxyGenerator/main/Stable/http.txt", "http", False),
              ("https://raw.githubusercontent.com/TheSpeedX/PROXY-List/master/http.txt", "http", False),
              ("https://raw.githubusercontent.com/mmpx12/proxy-list/master/http.txt", "http", False),
              ("https://raw.githubusercontent.com/zevtyardt/proxy-list/main/http.txt", "http", False),
              ("https://raw.githubusercontent.com/officialputuid/KangProxy/KangProxy/http/http.txt", "http", False),
              ("https://raw.githubusercontent.com/monosans/proxy-list/main/proxies/http.txt", "http", False),
              ("https://raw.githubusercontent.com/Anonym0usWork1221/Free-Proxies/main/proxy_files/http_proxies.txt", "http", False),
              ("https://raw.githubusercontent.com/rdavydov/proxy-list/main/proxies/http.txt", "http", False),
              ("https://raw.githubusercontent.com/clarketm/proxy-list/master/proxy-list-raw.txt", "http", False),
              ("https://raw.githubusercontent.com/sunny9577/proxy-scraper/master/proxies.txt", "http", False),
              ("https://raw.githubusercontent.com/roosterkid/openproxylist/main/HTTPS_RAW.txt", "http", False),
              ("https://raw.githubusercontent.com/ShiftyTR/Proxy-List/master/proxy.txt", "http", False),
              ("https://raw.githubusercontent.com/jetkai/proxy-list/main/online-proxies/txt/proxies-http.txt", "http", False),
              ("https://raw.githubusercontent.com/saschazesiger/server-proxies/master/http.txt", "http", False),
              ("https://raw.githubusercontent.com/a2u/free-proxy-list/master/free-proxy-list.txt", "http", False),
              ("https://raw.githubusercontent.com/B4RC0DE-TM/proxy-list/main/HTTP.txt", "http", False),
              ("https://raw.githubusercontent.com/roma8ok/proxy-list/main/proxy-list-http.txt", "http", False),
              ("https://raw.githubusercontent.com/yemixzy/proxy-list/main/proxy-list-http.txt", "http", False),
              ("https://raw.githubusercontent.com/ErcinDedeoglu/proxy-list/main/proxies/http.txt", "http", False),
              ("https://raw.githubusercontent.com/elliottophellia/proxylist/master/results/http.txt", "http", False),
              ("https://raw.githubusercontent.com/ObcbO/getproxy/master/file/http.txt", "http", False),
              ("https://raw.githubusercontent.com/fyvri/fresh-proxy-list/main/storage/raw/http.txt", "http", False),
              ("https://raw.githubusercontent.com/tuanminpay/live-proxy/master/http.txt", "http", False),
              ("https://raw.githubusercontent.com/zenjahid/FreeProxy4u/master/http.txt", "http", False),
              ("https://raw.githubusercontent.com/tisfeng/freedom-proxy/main/proxy-list/http.txt", "http", False),
              ("https://api.proxyscrape.com/v2/?request=get&protocol=http&timeout=10000&country=HK,JP,KR,SG,MY,TW,TH,VN,ID,PH&ssl=all&anonymity=all", "http", False),
              ("https://api.proxyscrape.com/v2/?request=get&protocol=http&timeout=10000&country=all&ssl=all&anonymity=all", "http", False),
          ]

          def log(msg):
              ts = time.strftime("%H:%M:%S")
              print("[{}] {}".format(ts, msg))
              sys.stdout.flush()

          def is_valid_port(port):
              try:
                  p = int(port)
                  return 1 <= p <= 65535
              except (ValueError, TypeError):
                  return False

          def parse_proxy_url(proxy_str):
              try:
                  parsed = urlparse(proxy_str)
                  host = parsed.hostname
                  port = parsed.port
                  if not host or not port or not is_valid_port(port):
                      return None
                  return host, port
              except Exception:
                  return None

          def fetch_one(url, default_proto):
              t0 = time.time()
              try:
                  r = requests.get(url, timeout=FETCH_TIMEOUT)
                  elapsed = time.time() - t0
                  if r.status_code != 200:
                      log("[FETCH] {} -> HTTP {} ({:.1f}s)".format(url.split("/")[-1], r.status_code, elapsed))
                      return []
                  text = r.text.strip()
                  if not text:
                      log("[FETCH] {} -> empty ({:.1f}s)".format(url.split("/")[-1], elapsed))
                      return []

                  protocol = default_proto
                  ct = r.headers.get("content-type", "")
                  raw = []

                  if "json" in ct or text.startswith("[") or text.startswith("{"):
                      try:
                          data = json.loads(text)
                          if isinstance(data, list):
                              for item in data:
                                  if isinstance(item, dict):
                                      proto = item.get("protocol", protocol)
                                      host = item.get("ip") or item.get("host")
                                      port = item.get("port")
                                      if host and is_valid_port(port):
                                          raw.append("{}://{}:{}".format(proto, host, port))
                                  elif isinstance(item, str) and re.match(r"[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+:[0-9]+", item):
                                      raw.append("http://{}".format(item))
                          elif isinstance(data, dict):
                              for key in ["proxies", "data", "list"]:
                                  if key in data and isinstance(data[key], list):
                                      for p in data[key]:
                                          if isinstance(p, dict):
                                              proto = p.get("protocol", protocol)
                                              host = p.get("ip") or p.get("host")
                                              port = p.get("port")
                                              if host and is_valid_port(port):
                                                  raw.append("{}://{}:{}".format(proto, host, port))
                      except Exception as e:
                          log("[JSON_ERR] {}: {}".format(url.split("/")[-1], e))
                  else:
                      for line in text.splitlines():
                          line = line.strip()
                          if not line or line.startswith("#"):
                              continue
                          if re.match(r"^[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}:[0-9]+$", line):
                              raw.append("{}://{}".format(protocol, line))
                          elif re.match(r"^[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}:[0-9]+:.+:.+$", line):
                              parts = line.split(":")
                              if len(parts) >= 4:
                                  ip, port = parts[0], parts[1]
                                  if is_valid_port(port):
                                      raw.append("{}://{}:{}".format(protocol, ip, port))
                          elif re.match(r"^(http|https)://[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}:[0-9]+$", line):
                              raw.append(line)
                          else:
                              m = re.match(r"^([0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}):([0-9]+)", line)
                              if m:
                                  if is_valid_port(m.group(2)):
                                      raw.append("{}://{}:{}".format(protocol, m.group(1), m.group(2)))

                  log("[FETCH] {} -> {} proxies ({:.1f}s)".format(url.split("/")[-1], len(raw), elapsed))
                  return raw
              except Exception as e:
                  elapsed = time.time() - t0
                  log("[FETCH_ERR] {} -> {} ({:.1f}s)".format(url.split("/")[-1], str(e)[:50], elapsed))
                  return []

          def fetch_sources():
              raw = []
              log("[FETCH] Starting {} HTTP sources...".format(len(SOURCES)))
              for url, default_proto, required in SOURCES:
                  raw.extend(fetch_one(url, default_proto))

              seen = set()
              result = []
              for p in raw:
                  p_lower = p.lower()
                  if p_lower not in seen:
                      seen.add(p_lower)
                      result.append(p)
              log("[FETCH] Total unique HTTP proxies: {}".format(len(result)))
              return result

          def tcp_check(host, port):
              try:
                  s = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
                  s.settimeout(TCP_TIMEOUT)
                  t0 = time.time()
                  s.connect((host, int(port)))
                  lat = (time.time() - t0) * 1000
                  s.close()
                  return True, lat
              except Exception:
                  return False, 99999

          def http_check(proxy_url):
              """真代理验证：通过 httpbin.org/ip 确认请求被转发，且出口IP与代理IP不同"""
              try:
                  proxies = {"http": proxy_url, "https": proxy_url}
                  t0 = time.time()
                  r = requests.get(TEST_URL, proxies=proxies, timeout=HTTP_TIMEOUT)
                  lat = (time.time() - t0) * 1000

                  if r.status_code == 200 and "origin" in r.text:
                      try:
                          data = r.json()
                          returned_ip = data.get("origin", "").split(",")[0].strip()
                          proxy_ip = urlparse(proxy_url).hostname

                          # 确认返回的IP和代理IP不同（说明真的转发了）
                          if returned_ip and proxy_ip != returned_ip and lat <= MAX_LATENCY_MS:
                              return True, round(lat, 2), 200, returned_ip
                      except Exception:
                          pass

                  # 407 = 需要认证，不可用
                  if r.status_code == 407:
                      return False, lat, 407, None

                  return False, lat, r.status_code, None
              except Exception as e:
                  return False, 99999, str(e)[:30], None

          def validate_one(proxy_url):
              parsed = parse_proxy_url(proxy_url)
              if not parsed:
                  return None
              host, port = parsed

              ok, _ = tcp_check(host, port)
              if not ok:
                  return None

              ok, lat, status, exit_ip = http_check(proxy_url)
              if ok:
                  return {
                      "url": proxy_url,
                      "scheme": "http",
                      "host": host,
                      "port": port,
                      "latency": lat,
                      "status": status,
                      "exit_ip": exit_ip
                  }
              return None

          def geo_check_batch(proxy_urls):
              if not proxy_urls:
                  return []
              ip_map = {}
              for p in proxy_urls:
                  parsed = parse_proxy_url(p)
                  if parsed:
                      host, _ = parsed
                      ip_map[host] = ip_map.get(host, []) + [p]
              ips = list(ip_map.keys())
              target_ips = set()
              batch_size = 100
              log("[GEO] Querying {} unique IPs via ip-api.com...".format(len(ips)))
              for i in range(0, len(ips), batch_size):
                  batch = ips[i:i+batch_size]
                  payload = [{"query": ip, "fields": "countryCode"} for ip in batch]
                  try:
                      r = requests.post(
                          "http://ip-api.com/batch?fields=countryCode",
                          json=payload,
                          timeout=30
                      )
                      if r.status_code == 200:
                          for item in r.json():
                              cc = item.get("countryCode", "")
                              query_ip = item.get("query")
                              if query_ip and cc in TARGET_CODES:
                                  target_ips.add(query_ip)
                      else:
                          log("[GEO_WARN] batch HTTP {}".format(r.status_code))
                  except Exception as e:
                      log("[GEO_ERR] {}".format(e))
                  if i + batch_size < len(ips):
                      time.sleep(2)
              result = []
              for ip in target_ips:
                  if ip in ip_map:
                      result.extend(ip_map[ip])
              log("[GEO] Target IPs kept ({}): {} / {}".format(
                  ", ".join(sorted(TARGET_CODES)), len(result), len(proxy_urls)
              ))
              return result

          # ========== 主流程 ==========
          log("=" * 60)
          log("[Config] HTTP Only | Real proxy verify | Geo filter: {} | Target: {}".format(
              ENABLE_GEO_FILTER, ", ".join(sorted(TARGET_CODES))
          ))
          log("=" * 60)

          log("[1/4] Fetching HTTP proxy sources...")
          t_start = time.time()
          candidates = fetch_sources()
          log("[1/4] Done in {:.1f}s".format(time.time() - t_start))

          # 过滤无效端口
          valid_candidates = []
          invalid_count = 0
          for p in candidates:
              if parse_proxy_url(p):
                  valid_candidates.append(p)
              else:
                  invalid_count += 1
          if invalid_count > 0:
              log("[WARN] Filtered {} proxies with invalid ports".format(invalid_count))
          candidates = valid_candidates
          log("[1/4] Valid proxies after port check: {}".format(len(candidates)))

          log("[2/4] TCP connectivity check...")
          t_start = time.time()
          tcp_alive = []
          checked = 0
          with ThreadPoolExecutor(max_workers=MAX_WORKERS) as ex:
              futures = {}
              for p in candidates:
                  parsed = parse_proxy_url(p)
                  if parsed:
                      host, port = parsed
                      futures[ex.submit(tcp_check, host, port)] = p
              for future in as_completed(futures):
                  p = futures[future]
                  ok, lat = future.result()
                  checked += 1
                  if ok:
                      tcp_alive.append(p)
                  if checked % 1000 == 0:
                      log("[2/4] Progress: {}/{} TCP checked, {} passed".format(checked, len(candidates), len(tcp_alive)))
          log("[2/4] Done in {:.1f}s - TCP passed: {} / {}".format(time.time() - t_start, len(tcp_alive), len(candidates)))

          if ENABLE_GEO_FILTER:
              log("[3/4] Geo-filtering to target regions...")
              t_start = time.time()
              target_proxies = geo_check_batch(tcp_alive)

              if len(target_proxies) >= GEO_MIN_COUNT:
                  validate_pool = target_proxies
                  log("[3/4] Done in {:.1f}s - Target: {} (sufficient, no fallback)".format(
                      time.time() - t_start, len(validate_pool)
                  ))
              else:
                  validate_pool = tcp_alive
                  log("[WARN] Target regions only {} proxies (< {}), falling back to all {} TCP-alive proxies".format(
                      len(target_proxies), GEO_MIN_COUNT, len(tcp_alive)
                  ))
          else:
              log("[3/4] Geo-filter skipped, using all TCP-alive proxies...")
              validate_pool = tcp_alive
              log("[3/4] Validate pool: {}".format(len(validate_pool)))

          log("[4/4] Validating real HTTP proxies (httpbin.org/ip)...")
          t_start = time.time()
          alive = []
          dead = 0
          checked = 0
          with ThreadPoolExecutor(max_workers=MAX_WORKERS) as ex:
              futures = {ex.submit(validate_one, p): p for p in validate_pool}
              for future in as_completed(futures):
                  res = future.result()
                  checked += 1
                  if res:
                      alive.append(res)
                      if len(alive) <= 5:
                          log("[4/4] ALIVE {} | {}ms | ExitIP: {}".format(
                              res["url"], res["latency"], res["exit_ip"]
                          ))
                  else:
                      dead += 1
                  if checked % 500 == 0:
                      log("[4/4] Progress: {}/{} checked, {} alive".format(checked, len(validate_pool), len(alive)))
          log("[4/4] Done in {:.1f}s - Alive: {} / Dead: {}".format(time.time() - t_start, len(alive), dead))

          alive.sort(key=lambda x: x["latency"])
          selected = alive[:TOP_N]
          log("Selected top {} real HTTP proxies by latency".format(len(selected)))

          proxy_directives = []
          for item in selected:
              proxy_directives.append("PROXY {}:{}".format(item["host"], item["port"]))

          proxy_chain = "; ".join(proxy_directives) + "; DIRECT" if proxy_directives else "DIRECT"
          log("[PAC] Proxy chain: {}".format(proxy_chain[:200] + "..." if len(proxy_chain) > 200 else proxy_chain))

          blocked_domains = [
              "*.google.com", "*.googleapis.com", "*.googleusercontent.com",
              "*.gstatic.com", "*.youtube.com", "*.ytimg.com", "*.ggpht.com",
              "*.twitter.com", "*.x.com", "*.twimg.com",
              "*.facebook.com", "*.fbcdn.net", "*.fb.com",
              "*.instagram.com", "*.cdninstagram.com",
              "*.wikipedia.org", "*.wikimedia.org",
              "*.github.com", "*.githubusercontent.com", "*.githubassets.com",
              "*.medium.com", "*.reddit.com", "*.redd.it",
              "*.twitch.tv", "*.ttvnw.net",
              "*.chatgpt.com", "*.openai.com", "*.oaistatic.com",
              "*.claude.ai", "*.anthropic.com",
              "*.gmail.com", "*.bbc.com", "*.bbc.co.uk",
              "*.voachinese.com", "*.voa.gov",
              "*.dropbox.com", "*.dropboxusercontent.com",
              "*.archive.org", "*.cloudfront.net",
              "*.tiktok.com", "*.tiktokv.com",
              "*.telegram.org", "*.t.me",
              "*.linkedin.com", "*.licdn.com",
              "*.netflix.com", "*.nflxvideo.net",
              "*.quora.com", "*.pinterest.com", "*.tumblr.com",
              "*.soundcloud.com", "*.spotify.com",
              "*.nytimes.com", "*.washingtonpost.com", "*.reuters.com",
              "*.apnews.com", "*.dw.com", "*.rfa.org",
              "*.chinadigitaltimes.net", "*.greatfire.org",
              "*.signal.org", "*.wire.com"
          ]

          pac_lines = [
              'function FindProxyForURL(url, host) {',
              '    if (shExpMatch(host, "*.cn") ||',
              '        shExpMatch(host, "*.com.cn") ||',
              '        shExpMatch(host, "*.gov.cn") ||',
              '        shExpMatch(host, "*.edu.cn") ||',
              '        isInNet(host, "10.0.0.0", "255.0.0.0") ||',
              '        isInNet(host, "172.16.0.0", "255.240.0.0") ||',
              '        isInNet(host, "192.168.0.0", "255.255.0.0") ||',
              '        isInNet(host, "127.0.0.0", "255.255.255.0") ||',
              '        isPlainHostName(host)) {',
              '        return "DIRECT";',
              '    }',
              '',
              '    var blocked = ['
          ]
          for i, d in enumerate(blocked_domains):
              comma = "," if i < len(blocked_domains) - 1 else ""
              pac_lines.append('        "{}"{}'.format(d, comma))
          pac_lines.extend([
              '    ];',
              '    for (var i = 0; i < blocked.length; i++) {',
              '        if (shExpMatch(host, blocked[i])) {',
              '            return "{}";'.format(proxy_chain),
              '        }',
              '    }',
              '',
              '    return "DIRECT";',
              '}'
          ])
          pac_content = "\n".join(pac_lines)

          os.makedirs("output", exist_ok=True)
          with open("output/proxy.pac", "w", encoding="utf-8") as f:
              f.write(pac_content)

          with open("output/proxy_list.txt", "w", encoding="utf-8") as f:
              f.write("# Generated: {}\n".format(time.strftime("%Y-%m-%d %H:%M:%S")))
              f.write("# Mode: HTTP ONLY (Real Proxy Verify) | Test URL: {}\n".format(TEST_URL))
              f.write("# Target Regions: {}\n".format(", ".join(sorted(TARGET_CODES))))
              f.write("# Geo Filter: {} | TCP<{}s | HTTP<{}s | Latency<{}ms\n".format(
                  ENABLE_GEO_FILTER, TCP_TIMEOUT, HTTP_TIMEOUT, MAX_LATENCY_MS
              ))
              f.write("-" * 60 + "\n")
              if selected:
                  for item in selected:
                      f.write("{} | {}ms | HTTP {} | ExitIP: {}\n".format(
                          item["url"], item["latency"], item["status"], item["exit_ip"]
                      ))
              else:
                  f.write("# WARNING: No usable HTTP proxies found.\n")

          html_parts = [
              '<!DOCTYPE html>',
              '<html>',
              '<head><meta charset="utf-8"><title>Proxy Pool Status</title>',
              '<style>',
              'body{font-family:monospace;max-width:900px;margin:40px auto;padding:20px}',
              'h1{border-bottom:2px solid #333}pre{background:#f4f4f4;padding:15px;overflow:auto}',
              '.ok{color:green}.warn{color:orange}.err{color:red}',
              'table{border-collapse:collapse;width:100%}th,td{border:1px solid #ccc;padding:8px;text-align:left}',
              'th{background:#eee}',
              '</style></head>',
              '<body>',
              '<h1>Proxy Pool Status</h1>',
          ]
          status_class = "ok" if selected else "err"
          status_text = "OK" if selected else "NO PROXY"
          html_parts.append('<p class="{}">Status: {}</p>'.format(status_class, status_text))
          html_parts.append('<p>Generated: {}</p>'.format(time.strftime("%Y-%m-%d %H:%M:%S")))
          html_parts.append('<p>Mode: <b>HTTP ONLY (Real Proxy Verify)</b></p>')
          html_parts.append('<p>Target Regions: <b>{}</b></p>'.format(
              ", ".join(sorted(TARGET_CODES))
          ))
          html_parts.append('<p>Fetched: {} | TCP: {} | Alive: {} | Selected: {}</p>'.format(
              len(candidates), len(tcp_alive), len(alive), len(selected)
          ))
          html_parts.extend([
              '<h2>PAC URL</h2>',
              '<code>https://luckyprc.github.io/tbb1333r1/proxy.pac</code>',
              '<h2>Selected Proxies</h2>',
              '<table>',
              '<tr><th>Proxy</th><th>Latency</th><th>Status</th><th>Exit IP</th></tr>',
          ])
          if selected:
              for s in selected:
                  html_parts.append('<tr><td>{}</td><td>{}ms</td><td>HTTP {}</td><td>{}</td></tr>'.format(
                      s["url"], s["latency"], s["status"], s["exit_ip"]
                  ))
          else:
              html_parts.append('<tr><td colspan=4>No HTTP proxies</td></tr>')
          html_parts.extend([
              '</table>',
              '<h2>Raw List</h2>',
              '<pre>',
          ])
          if selected:
              for s in selected:
                  html_parts.append('{} | {}ms | HTTP {} | ExitIP: {}'.format(
                      s["url"], s["latency"], s["status"], s["exit_ip"]
                  ))
          else:
              html_parts.append('No usable HTTP proxies')
          html_parts.extend([
              '</pre>',
              '</body></html>',
          ])
          html = "\n".join(html_parts)
          with open("output/index.html", "w", encoding="utf-8") as f:
              f.write(html)

          summary = "Fetched {}, TCP {}, Alive {}, Selected {}".format(
              len(candidates), len(tcp_alive), len(alive), len(selected)
          )
          gh_out = os.environ.get("GITHUB_OUTPUT", "/dev/null")
          with open(gh_out, "a") as fh:
              print("summary={}".format(summary), file=fh)

          log("[DONE] {}".format(summary))
          log("      Files written: output/proxy.pac, output/proxy_list.txt, output/index.html")
          log("=" * 60)
          PYEOF
        env:
          INPUT_ENABLE_GEO_FILTER: ${{ github.event.inputs.enable_geo_filter || 'true' }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./output

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
